<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Follow Target</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #0a1020;
        color: #e2e8f0;
      }
      .page {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        padding: 12px;
      }
      .bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .bar button {
        border: 1px solid #334155;
        border-radius: 6px;
        background: #0b1220;
        color: #e2e8f0;
        padding: 4px 10px;
        cursor: pointer;
      }
      #occ-canvas-host {
        position: relative;
        width: 100%;
        height: calc(100% - 44px);
        border: 2px solid #22d3ee;
        border-radius: 8px;
        background: linear-gradient(180deg, #0b1324, #0a0f1d);
      }
      .tag {
        position: absolute;
        left: 8px;
        top: 8px;
        font-size: 12px;
        background: rgba(2, 6, 23, 0.75);
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="bar">
        <button id="btn-smaller">缩小目标区域</button>
        <button id="btn-bigger">放大目标区域</button>
      </div>
      <div id="occ-canvas-host">
        <div class="tag">iframe 内目标 DOM: #occ-canvas-host</div>
      </div>
    </div>
    <script>
      const target = document.getElementById('occ-canvas-host');
      const btnSmaller = document.getElementById('btn-smaller');
      const btnBigger = document.getElementById('btn-bigger');

      function reportRect() {
        if (!target) return;
        const r = target.getBoundingClientRect();
        window.parent.postMessage(
          {
            type: 'qt-follow-rect',
            targetId: 'occ-canvas-host',
            x: Math.round(r.left),
            y: Math.round(r.top),
            width: Math.max(1, Math.round(r.width)),
            height: Math.max(1, Math.round(r.height)),
          },
          '*'
        );
      }

      btnSmaller.addEventListener('click', () => {
        target.style.height = 'calc(100% - 120px)';
        reportRect();
      });
      btnBigger.addEventListener('click', () => {
        target.style.height = 'calc(100% - 44px)';
        reportRect();
      });

      new ResizeObserver(reportRect).observe(target);
      window.addEventListener('resize', reportRect);
      window.addEventListener('scroll', reportRect, true);
      requestAnimationFrame(reportRect);
    </script>
  </body>
</html>
